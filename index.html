<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organograma interativo SEMED de Nova Olinda do Norte</title>
  <style>
    :root {
      --bg: #f6efe3;
      --paper: rgba(255, 252, 247, 0.96);
      --card: #ffffff;
      --ink: #1f2a33;
      --muted: #697983;
      --line: #d9c9ae;
      --primary: #0f6f68;
      --primary-soft: rgba(15, 111, 104, 0.08);
      --accent: #cc7a2f;
      --connector: #141414;
      --shadow: 0 10px 28px rgba(31, 42, 51, 0.14);
      --shadow-soft: 0 4px 12px rgba(31, 42, 51, 0.12);
      --radius: 26px;
      --font-title: Georgia, "Times New Roman", serif;
      --font-body: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(204, 122, 47, 0.18), transparent 26%),
        radial-gradient(circle at 85% 18%, rgba(15, 111, 104, 0.16), transparent 24%),
        linear-gradient(180deg, #f8f1e7 0%, #f6efe4 48%, #f3ebdf 100%);
    }

    .page {
      width: min(1800px, calc(100% - 20px));
      margin: 0 auto 34px;
    }

    .hero-band,
    .toolbar-band,
    .organogram-band {
      width: 100%;
      background: var(--paper);
      backdrop-filter: blur(12px);
    }

    .hero-band {
      display: grid;
      grid-template-columns: 120px 1fr 120px;
      gap: 24px;
      align-items: center;
      padding: 24px 28px;
      margin-top: 10px;
      margin-bottom: 18px;
      border: 1px solid rgba(217, 201, 174, 0.95);
      border-radius: 34px;
      box-shadow: var(--shadow);
      background:
        linear-gradient(135deg, rgba(15, 111, 104, 0.08), rgba(255, 252, 247, 0.97) 40%, rgba(204, 122, 47, 0.1)),
        var(--paper);
    }

    .brand-mark {
      width: 86px;
      height: 86px;
      object-fit: contain;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(217, 201, 174, 0.95);
      box-shadow: var(--shadow-soft);
      justify-self: center;
      padding: 8px;
    }

    .brand-mark.flag {
      padding: 6px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-family: var(--font-title);
      font-size: clamp(2.2rem, 4.8vw, 4.15rem);
      line-height: 0.98;
      letter-spacing: -0.02em;
    }

    .toolbar-band {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      margin-bottom: 18px;
      border: 1px solid rgba(217, 201, 174, 0.78);
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(31, 42, 51, 0.08);
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: rgba(15, 111, 104, 0.45);
      box-shadow: 0 0 0 4px rgba(15, 111, 104, 0.08);
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
      box-shadow: var(--shadow-soft);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: rgba(15, 111, 104, 0.08);
      color: var(--primary);
    }

    .count {
      min-width: 120px;
      text-align: right;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .organogram-band {
      padding: 20px 0 56px;
      overflow-x: auto;
      overflow-y: hidden;
      background: transparent;
    }

    .org-root {
      min-width: 1420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 18px 56px 34px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.88), rgba(255, 252, 247, 0.78)),
        radial-gradient(circle at top, rgba(15, 111, 104, 0.04), transparent 38%);
      border-top: 1px solid rgba(217, 201, 174, 0.46);
      border-bottom: 1px solid rgba(217, 201, 174, 0.46);
    }

    .org-row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 34px;
      position: relative;
    }

    .org-row.executive {
      gap: 92px;
      padding-left: 260px;
    }

    .org-row.directorias {
      justify-content: space-between;
      gap: 28px;
      padding: 0 108px;
      align-items: stretch;
    }

    .org-connector-v {
      width: 4px;
      height: 42px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-connector-h {
      width: calc(100% - 300px);
      height: 4px;
      background: var(--connector);
      border-radius: 999px;
      position: relative;
    }

    .org-connector-h::before,
    .org-connector-h::after {
      content: "";
      position: absolute;
      top: 0;
      width: 4px;
      height: 36px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-connector-h::before {
      left: 0;
    }

    .org-connector-h::after {
      right: 0;
    }

    .org-director-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(var(--director-count, 4), minmax(258px, 1fr));
      gap: 28px;
      padding: 0 108px;
      align-items: start;
    }

    .org-director-slot {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .org-director-slot::before {
      content: "";
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 40px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-card {
      width: 258px;
      min-height: 148px;
      background: var(--card);
      border: 1px solid rgba(120, 106, 82, 0.28);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
      position: relative;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .org-card.root {
      width: 310px;
    }

    .org-card.open {
      border-color: rgba(15, 111, 104, 0.46);
      box-shadow: 0 10px 22px rgba(15, 111, 104, 0.16);
      background: linear-gradient(180deg, rgba(15, 111, 104, 0.03), white 36%);
    }

    .org-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(31, 42, 51, 0.18);
    }

    .org-card-main {
      cursor: pointer;
    }

    .org-level {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .org-title {
      font-size: 0.98rem;
      line-height: 1.26;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .org-subtitle,
    .org-subordination {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .org-subordination {
      margin-top: 6px;
    }

    .org-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .org-occupant {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(217, 201, 174, 0.95);
      min-height: 54px;
    }

    .org-avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      object-fit: cover;
      flex: 0 0 auto;
      background: linear-gradient(135deg, rgba(15, 111, 104, 0.16), rgba(204, 122, 47, 0.18));
      border: 1px solid rgba(15, 111, 104, 0.14);
    }

    .org-avatar.placeholder {
      display: grid;
      place-items: center;
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
    }

    .org-occupant-text {
      min-width: 0;
    }

    .org-occupant-name {
      font-size: 12px;
      line-height: 1.25;
      font-weight: 800;
      color: var(--ink);
      word-break: break-word;
    }

    .org-occupant-role {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
    }

    .chip {
      border: 1px solid rgba(15, 111, 104, 0.18);
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .chip.toggle {
      background: transparent;
      border-color: transparent;
      color: var(--primary);
      padding-left: 0;
    }

    .org-branch {
      display: none;
      width: 100%;
      margin-top: 16px;
    }

    .org-branch.open {
      display: block;
    }

    .org-branch-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: flex-start;
      padding-left: 44px;
      position: relative;
    }

    .org-branch-column::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-branch-column::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      width: 18px;
      height: 4px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-branch-node {
      position: relative;
      padding-left: 34px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .org-branch-node::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 50px;
      width: 18px;
      height: 4px;
      background: var(--connector);
      border-radius: 999px;
    }

    .org-branch-node.with-nested::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 50px;
      bottom: 0;
      width: 4px;
      background: var(--connector);
      border-radius: 999px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 20, 0.42);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 40;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(82vh, 900px);
      overflow: auto;
      border-radius: 28px;
      background: rgba(255, 252, 247, 0.98);
      border: 1px solid rgba(217, 201, 174, 0.95);
      box-shadow: 0 22px 46px rgba(20, 20, 20, 0.22);
      padding: 26px 26px 22px;
    }

    .modal-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .modal-type {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .modal-title {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.05;
    }

    .modal-subtitle {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.55;
    }

    .modal-close {
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(15, 111, 104, 0.08);
      color: var(--primary);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .modal-block {
      background: white;
      border: 1px solid rgba(217, 201, 174, 0.95);
      border-radius: 22px;
      padding: 18px 18px 16px;
    }

    .modal-block h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .modal-block p {
      margin: 0;
      color: #334550;
      line-height: 1.72;
    }

    .modal-source {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed rgba(217, 201, 174, 0.95);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .hero-band {
        grid-template-columns: 96px 1fr 96px;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 18px, 1800px);
        margin-top: 8px;
      }

      .hero-band {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 14px;
      }

      .toolbar-band {
        grid-template-columns: 1fr;
      }

      .count {
        text-align: left;
      }

      .brand-mark {
        width: 74px;
        height: 74px;
      }

      .org-root {
        min-width: 1180px;
        padding-inline: 28px;
      }

      .org-director-grid {
        padding: 0 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero-band">
      <img class="brand-mark flag" src="Bandeira de NON.png" alt="Bandeira de Nova Olinda do Norte" onerror="this.style.display='none'">
      <h1>Organograma interativo SEMED de Nova Olinda do Norte</h1>
      <img class="brand-mark" src="Logo SEMED NON.png" alt="Logotipo da SEMED" onerror="this.style.display='none'">
    </header>

    <section class="toolbar-band">
      <input id="searchInput" class="search" type="search" placeholder="Pesquisar cargo, setor, diretoria, coordenação ou escola">
      <button id="expandAllBtn" class="btn btn-primary" type="button">Expandir tudo</button>
      <button id="collapseAllBtn" class="btn btn-secondary" type="button">Recolher</button>
      <div id="resultCount" class="count"></div>
    </section>

    <section class="organogram-band">
      <div id="organogramRoot" class="org-root"></div>
    </section>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-top">
        <div>
          <div id="modalType" class="modal-type"></div>
          <h2 id="modalTitle" class="modal-title"></h2>
          <div id="modalSubtitle" class="modal-subtitle"></div>
        </div>
        <button id="modalCloseBtn" class="modal-close" type="button" aria-label="Fechar">×</button>
      </div>
      <div class="modal-grid">
        <div id="modalOcupante" class="modal-block hidden">
          <h3>Ocupante</h3>
          <p></p>
        </div>
        <div id="modalAtribuicoes" class="modal-block hidden">
          <h3>Atribuições</h3>
          <p></p>
        </div>
        <div id="modalEntregas" class="modal-block hidden">
          <h3>Entregas mínimas</h3>
          <p></p>
        </div>
      </div>
      <div id="modalSource" class="modal-source"></div>
    </div>
  </div>

  <script>
    window.ORG_REMOTE_URL = "https://script.google.com/macros/s/AKfycbxkwNmfcl_VaPvC6XvYpELDBsPjed84iHiFKnZe3-a-uHvfrdN7V5l-4q4jwM9U6j9T/exec";
  </script>
  <script src="dados/estrutura_organizacional_semed_nova_olinda.js"></script>
  <script>
    const data = [];
    const byId = new Map();
    const childrenMap = new Map();

    const state = {
      query: "",
      openNodes: new Set(["n1"])
    };

    const searchInput = document.getElementById("searchInput");
    const expandAllBtn = document.getElementById("expandAllBtn");
    const collapseAllBtn = document.getElementById("collapseAllBtn");
    const resultCount = document.getElementById("resultCount");
    const organogramRoot = document.getElementById("organogramRoot");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalType = document.getElementById("modalType");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalOcupante = document.getElementById("modalOcupante");
    const modalAtribuicoes = document.getElementById("modalAtribuicoes");
    const modalEntregas = document.getElementById("modalEntregas");
    const modalSource = document.getElementById("modalSource");

    function normalize(value) {
      return (value || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function rebuildIndexes() {
      byId.clear();
      childrenMap.clear();

      data.forEach(item => {
        byId.set(item.id, item);
      });

      data.forEach(item => {
        const key = item.parent_id || "__root__";
        if (!childrenMap.has(key)) {
          childrenMap.set(key, []);
        }
        childrenMap.get(key).push(item);
      });
    }

    function nodeText(node) {
      return [
        node.cargo,
        node.unidade,
        node.tipo,
        node.subordinado_a,
        node.atribuicoes,
        node.entregas_minimas
      ].join(" ");
    }

    function hasMatchInBranch(node, query) {
      if (!query) {
        return true;
      }

      if (normalize(nodeText(node)).includes(query)) {
        return true;
      }

      const children = childrenMap.get(node.id) || [];
      return children.some(child => hasMatchInBranch(child, query));
    }

    function formatType(type) {
      return (type || "").replaceAll("_", " ");
    }

    function initials(text) {
      return (text || "")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map(chunk => chunk[0])
        .join("")
        .toUpperCase() || "SE";
    }

    function normalizeImageUrl(url) {
      const value = (url || "").trim();
      if (!value) {
        return "";
      }

      if (value.includes("github.com") && value.includes("/blob/")) {
        return value
          .replace("https://github.com/", "https://raw.githubusercontent.com/")
          .replace("/blob/", "/");
      }

      return value;
    }

    function openModal(node, section) {
      modalType.textContent = formatType(node.tipo);
      modalTitle.textContent = node.cargo;
      modalSubtitle.innerHTML = `<strong>Unidade:</strong> ${node.unidade || "-"}<br><strong>Subordinado a:</strong> ${node.subordinado_a || "Nível inicial do organograma"}`;

      const showAtribuicoes = section === "atribuicoes" || section === "ambos";
      const showEntregas = section === "entregas" || section === "ambos";
      const ocupante = node.ocupante_nome || "";

      modalAtribuicoes.classList.toggle("hidden", !showAtribuicoes);
      modalEntregas.classList.toggle("hidden", !showEntregas);
      modalOcupante.classList.toggle("hidden", !ocupante);

      if (ocupante) {
        modalOcupante.querySelector("p").textContent = ocupante;
      }

      modalAtribuicoes.querySelector("p").textContent = node.atribuicoes || "Sem atribuições cadastradas.";
      modalEntregas.querySelector("p").textContent = node.entregas_minimas || "Sem entregas mínimas cadastradas.";

      modalSource.innerHTML = `<strong>Fonte:</strong> ${node.fonte_documento || "-"}<br><strong>Base normativa:</strong> ${node.fonte_artigos || "-"}`;
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
    }

    function toggleNode(id) {
      if (state.openNodes.has(id)) {
        state.openNodes.delete(id);
      } else {
        state.openNodes.add(id);
      }

      renderOrganogram();
    }

    function createCard(node, extraClass = "") {
      const hasChildren = (childrenMap.get(node.id) || []).length > 0;
      const card = document.createElement("div");
      card.className = `org-card ${extraClass} ${state.openNodes.has(node.id) ? "open" : ""}`.trim();

      const main = document.createElement("div");
      main.className = "org-card-main";
      const imageUrl = normalizeImageUrl(node.ocupante_foto_url);
      const occupantName = node.ocupante_nome || "";
      main.innerHTML = `
        <div class="org-level">Nível ${node.nivel}</div>
        <div class="org-title">${node.cargo}</div>
        <div class="org-subtitle">${node.unidade || ""}</div>
        <div class="org-subordination"><strong>Subordinação:</strong> ${node.subordinado_a || "Nível inicial do organograma"}</div>
        <div class="org-occupant">
          ${imageUrl
            ? `<img class="org-avatar" src="${imageUrl}" alt="Foto de ${occupantName || node.cargo}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'org-avatar placeholder',textContent:'${initials(occupantName || node.cargo)}'}))">`
            : `<div class="org-avatar placeholder">${initials(occupantName || node.cargo)}</div>`}
          <div class="org-occupant-text">
            <div class="org-occupant-name">${occupantName || "Cargo sem ocupante vinculado"}</div>
            <div class="org-occupant-role">${occupantName ? "Ocupante do cargo" : "Espaço para nome e foto"}</div>
          </div>
        </div>
      `;
      main.addEventListener("click", () => {
        if (hasChildren) {
          toggleNode(node.id);
        } else {
          openModal(node, "ambos");
        }
      });

      const actions = document.createElement("div");
      actions.className = "org-actions";

      if (hasChildren) {
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "chip toggle";
        toggle.textContent = state.openNodes.has(node.id) ? "Recolher" : "Abrir";
        toggle.addEventListener("click", event => {
          event.stopPropagation();
          toggleNode(node.id);
        });
        actions.appendChild(toggle);
      }

      const attr = document.createElement("button");
      attr.type = "button";
      attr.className = "chip";
      attr.textContent = "Atribuições";
      attr.addEventListener("click", event => {
        event.stopPropagation();
        openModal(node, "atribuicoes");
      });
      actions.appendChild(attr);

      const entregas = document.createElement("button");
      entregas.type = "button";
      entregas.className = "chip";
      entregas.textContent = "Entregas";
      entregas.addEventListener("click", event => {
        event.stopPropagation();
        openModal(node, "entregas");
      });
      actions.appendChild(entregas);

      card.appendChild(main);
      card.appendChild(actions);
      return card;
    }

    function renderBranchColumn(parentId) {
      const children = childrenMap.get(parentId) || [];
      if (!children.length) {
        return null;
      }

      const wrap = document.createElement("div");
      wrap.className = `org-branch ${state.openNodes.has(parentId) ? "open" : ""}`;

      const column = document.createElement("div");
      column.className = "org-branch-column";

      children.forEach(child => {
        const item = document.createElement("div");
        item.className = "org-branch-node";
        item.appendChild(createCard(child));

        const nested = renderBranchColumn(child.id);
        if (nested) {
          item.classList.add("with-nested");
          item.appendChild(nested);
        }

        column.appendChild(item);
      });

      wrap.appendChild(column);
      return wrap;
    }

    function renderOrganogram() {
      organogramRoot.innerHTML = "";

      const roots = childrenMap.get("__root__") || [];
      const root = roots.find(node => hasMatchInBranch(node, normalize(state.query)));

      if (!root) {
        resultCount.textContent = "0 cargos/funções";
        return;
      }

      const directChildren = (childrenMap.get(root.id) || []).filter(node => hasMatchInBranch(node, normalize(state.query)));
      const adjunto = directChildren.find(node => normalize(node.cargo).includes("adjunto"));
      const gabinete = directChildren.find(node => normalize(node.cargo).includes("gabinete"));
      const diretorias = directChildren.filter(node => node.id !== (adjunto && adjunto.id) && node.id !== (gabinete && gabinete.id));

      const stage = document.createElement("div");
      stage.className = "org-root";

      const rowRoot = document.createElement("div");
      rowRoot.className = "org-row";
      rowRoot.appendChild(createCard(root, "root"));
      stage.appendChild(rowRoot);

      stage.appendChild(document.createElement("div")).className = "org-connector-v";

      if (adjunto || gabinete) {
        const rowExec = document.createElement("div");
        rowExec.className = "org-row executive";
        if (adjunto) {
          rowExec.appendChild(createCard(adjunto));
        }
        if (gabinete) {
          rowExec.appendChild(createCard(gabinete));
        }
        stage.appendChild(rowExec);
      }

      if (diretorias.length) {
        const line = document.createElement("div");
        line.className = "org-connector-h";
        stage.appendChild(line);

        const directorGrid = document.createElement("div");
        directorGrid.className = "org-director-grid";
        directorGrid.style.setProperty("--director-count", String(diretorias.length));

        diretorias.forEach(node => {
          const slot = document.createElement("div");
          slot.className = "org-director-slot";
          slot.appendChild(createCard(node));

          const branch = renderBranchColumn(node.id);
          if (branch) {
            slot.appendChild(branch);
          }

          directorGrid.appendChild(slot);
        });

        stage.appendChild(directorGrid);
      }

      organogramRoot.appendChild(stage);

      const query = state.query.trim();
      const total = data.filter(node => hasMatchInBranch(node, normalize(query)) && normalize(nodeText(node)).includes(normalize(query))).length;
      resultCount.textContent = query ? `${total} resultado(s)` : `${data.length} cargos/funções`;
    }

    async function resolveDataSource() {
      const params = new URLSearchParams(window.location.search);
      const remoteUrl = params.get("data") || window.ORG_REMOTE_URL || "";

      if (!remoteUrl) {
        return Array.isArray(window.ORG_DATA) ? window.ORG_DATA : [];
      }

      const response = await fetch(remoteUrl);
      if (!response.ok) {
        throw new Error(`Falha HTTP ${response.status} ao consultar o App Web.`);
      }

      const payload = await response.json();

      if (Array.isArray(payload)) {
        return payload;
      }

      if (Array.isArray(payload.items)) {
        return payload.items;
      }

      throw new Error("O App Web respondeu, mas o JSON não contém um array em items.");
    }

    async function bootstrap() {
      const incoming = await resolveDataSource();
      incoming.forEach(item => data.push(item));
      rebuildIndexes();
      renderOrganogram();
    }

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      if (state.query.trim()) {
        data.forEach(node => {
          if (hasMatchInBranch(node, normalize(state.query))) {
            state.openNodes.add(node.id);
          }
        });
      }
      renderOrganogram();
    });

    expandAllBtn.addEventListener("click", () => {
      data.forEach(node => state.openNodes.add(node.id));
      renderOrganogram();
    });

    collapseAllBtn.addEventListener("click", () => {
      state.openNodes = new Set(["n1"]);
      renderOrganogram();
    });

    modalCloseBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) {
        closeModal();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    bootstrap().catch(error => {
      console.error(error);
    });
  </script>
</body>
</html>
